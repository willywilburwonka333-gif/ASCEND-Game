    <main id="app" aria-label="ASCEND game"></main>
    <script>
      // Repair only the temporary rescue-shell state. Preserve all real progress.
      try {
        const key='ascend_project_kayla_v4';
        const p=JSON.parse(localStorage.getItem(key)||'{}');
        delete p.safeHomeOnly;
        delete p.bootRecovery;
        localStorage.setItem(key,JSON.stringify(p));
      } catch (_) {}
    </script>
