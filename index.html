<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#8ee7ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ASCEND — Project Kayla</title>
  <style>
    html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#8ee7ff,#dff8df 62%,#79d16e);font-family:Arial,sans-serif}
    #ascend-emergency{position:fixed;inset:0;z-index:999999;display:grid;place-items:center;padding:18px;background:linear-gradient(180deg,#8ee7ff,#dff8df 62%,#79d16e);color:#17324d}
    #ascend-emergency[hidden]{display:none!important}.ae-card{width:min(560px,100%);box-sizing:border-box;background:#fff8df;border:7px solid #fff;border-radius:28px;padding:22px;text-align:center;box-shadow:0 20px 55px #17324d33}.ae-card h1{margin:0 0 8px;color:#6b4cc5;font-size:38px}.ae-spinner{width:52px;height:52px;margin:16px auto;border:7px solid #d9d0ff;border-top-color:#6b4cc5;border-radius:50%;animation:spin .8s linear infinite}.ae-actions{display:grid;gap:10px;margin-top:18px}.ae-actions button{min-height:56px;border:4px solid #fff;border-radius:16px;padding:12px 16px;font-weight:900;font-size:16px}.ae-retry{background:#6b4cc5;color:#fff}.ae-opening{background:#73d8bd}.ae-home{background:#ffca57}.ae-reset{background:#eef7ff}.ae-status{font-size:13px;color:#526f80;margin-top:12px}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main id="app" aria-label="ASCEND game"></main>
  <section id="ascend-emergency">
    <div class="ae-card">
      <h1>ASCEND</h1>
      <p class="ae-message">Loading the safe game home…</p>
      <div class="ae-spinner"></div>
      <div class="ae-actions" hidden>
        <button class="ae-retry">TRY AGAIN</button>
        <button class="ae-opening">CONTINUE THE OPENING</button>
        <button class="ae-home">OPEN GAME HOME</button>
        <button class="ae-reset">RESTART TUTORIAL ONLY</button>
      </div>
      <div class="ae-status">Your collection and adult assignments will not be deleted.</div>
    </div>
  </section>
  <script>
    (function(){
      var KEY='ascend_project_kayla_v4',screen=document.getElementById('ascend-emergency');
      function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}}
      function save(p){try{localStorage.setItem(KEY,JSON.stringify(p))}catch(e){}}
      screen.querySelector('.ae-retry').onclick=function(){location.reload()};
      screen.querySelector('.ae-opening').onclick=function(){var p=load();p.onboardingComplete=true;p.diagnosticComplete=false;p.openingAdventure=Object.assign({},p.openingAdventure||{},{completed:false});save(p);location.reload()};
      screen.querySelector('.ae-home').onclick=function(){screen.hidden=true;if(window.ASCEND_STABLE_HOME)window.ASCEND_STABLE_HOME.show()};
      screen.querySelector('.ae-reset').onclick=function(){var p=load();p.onboardingComplete=false;p.diagnosticComplete=false;p.diagnosticIndex=0;delete p.openingAdventure;save(p);location.reload()};
      setTimeout(function(){if(!window.ASCEND_BOOT){screen.querySelector('.ae-message').textContent='The boot manager did not start. Try again after Vercel finishes deploying.';screen.querySelector('.ae-spinner').style.display='none';screen.querySelector('.ae-actions').hidden=false}},5000);
    })();
  </script>
  <script type="module" src="/src/boot-manager.js"></script>
</body>
</html>
